    <script>
      (function() {
        var MAP = {
          'applynow': 'Request a Mortgage Review | BuyWiser Home Loans',
          'mortgagecalculators': 'Mortgage Calculators | BuyWiser Home Loans',
          'contactus': 'Contact BuyWiser | BuyWiser Home Loans',

          ' copy': 'BuyWiser Home Loans | California Mortgage Guidance'
        };
        function clean() {
          var t = document.title;
          var lower = t.toLowerCase();
          for (var key in MAP) {
            if (lower.indexOf(key) !== -1) {
              document.title = MAP[key];
              return;
            }
          }
        }
        clean();
        var obs = new MutationObserver(clean);
        obs.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
      })();
